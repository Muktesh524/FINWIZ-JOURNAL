<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FinWiz Journal{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #7c3aed;
            --secondary-color: #6d28d9;
            --background-dark: #0f172a;
            --background-light: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --accent-color: #ec4899;
            --success-color: #10b981;
            --danger-color: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background-dark);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            padding: 40px 20px;
            text-align: center;
            margin-bottom: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(124, 58, 237, 0.3);
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.1em;
        }

        .metadata {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 30px;
            font-size: 0.95em;
        }

        .metadata span {
            margin: 0 15px;
        }

        section {
            background-color: var(--background-light);
            padding: 30px;
            margin-bottom: 30px;
            border-radius: 10px;
            border-left: 4px solid var(--primary-color);
        }

        section h2 {
            font-size: 1.8em;
            margin-bottom: 20px;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .article {
            margin-bottom: 25px;
            padding-bottom: 25px;
            border-bottom: 1px solid rgba(226, 232, 240, 0.1);
        }

        .article:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .article h3 {
            font-size: 1.3em;
            margin-bottom: 10px;
            color: var(--accent-color);
        }

        .article a {
            color: var(--primary-color);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .article a:hover {
            color: var(--accent-color);
        }

        .article-meta {
            display: flex;
            gap: 15px;
            font-size: 0.9em;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .article-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .source-badge {
            display: inline-block;
            background-color: var(--primary-color);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 500;
        }

        .category-badge {
            display: inline-block;
            background-color: var(--secondary-color);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
        }

        .article-description {
            color: var(--text-secondary);
            margin-top: 10px;
            line-height: 1.7;
        }

        .market-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .market-table th {
            background-color: rgba(124, 58, 237, 0.2);
            padding: 15px;
            text-align: left;
            border-bottom: 2px solid var(--primary-color);
            font-weight: 600;
        }

        .market-table td {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(226, 232, 240, 0.1);
        }

        .market-table tr:hover {
            background-color: rgba(124, 58, 237, 0.1);
        }

        .price {
            font-weight: 600;
            font-size: 1.1em;
        }

        .positive {
            color: var(--success-color);
        }

        .negative {
            color: var(--danger-color);
        }

        .price-change {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .mover-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .mover-card {
            background-color: var(--background-dark);
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid var(--primary-color);
        }

        .mover-card.positive {
            border-left-color: var(--success-color);
        }

        .mover-card.negative {
            border-left-color: var(--danger-color);
        }

        .mover-symbol {
            font-weight: 600;
            font-size: 1.2em;
            margin-bottom: 8px;
        }

        .mover-price {
            font-size: 1.4em;
            margin-bottom: 8px;
        }

        .mover-change {
            font-size: 1.1em;
            font-weight: 500;
        }

        footer {
            text-align: center;
            padding: 30px 20px;
            color: var(--text-secondary);
            border-top: 1px solid rgba(226, 232, 240, 0.1);
            margin-top: 50px;
        }

        .page-break {
            page-break-after: always;
            margin: 40px 0;
            border-top: 2px dashed var(--primary-color);
            padding-top: 40px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px 10px;
            }

            header h1 {
                font-size: 1.8em;
            }

            section {
                padding: 20px;
            }

            .mover-grid {
                grid-template-columns: 1fr;
            }

            .market-table {
                font-size: 0.9em;
            }

            .market-table th,
            .market-table td {
                padding: 8px;
            }
        }

        @media print {
            body {
                background-color: white;
                color: black;
            }

            section {
                background-color: white;
                border: 1px solid #ccc;
                page-break-inside: avoid;
            }

            header {
                background: #f0f0f0;
            }
        }
    </style>
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
